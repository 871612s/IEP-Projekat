# =====================================================================
# Kompletan Kubernetes manifest za sistem upravljanja investicionim
# fondom. Pokretanje:
#
#     kubectl apply -f investfund-k8s.yaml
#
# Sadrži: ConfigMap, Secret, 2x PersistentVolumeClaim, i po jedan
# Deployment + Service za: postgres, mongo, redis, ganache,
# auth-service, employee-service (3 replike), director-service.
#
# Pretpostavke:
#  - auth-service / employee-service / director-service su slike koje
#    si sam izgradio. Za lokalno testiranje (minikube) najlakše je
#    izgraditi ih direktno u klasterov Docker daemon:
#        eval $(minikube docker-env) && docker build -t auth-service .
#    i ostaviti imagePullPolicy: IfNotPresent kao ispod, umesto da ih
#    push-uješ na neki registry.
#  - Aplikacije same imaju par pokušaja (retry) na konekciju ka bazama;
#    initContainer ispod je dodatna, brža zaštita od crash-loop-a na
#    hladnom startu celog sistema (kad svi pod-ovi krenu istovremeno).
#  - Sa --deterministic flagom, Ganache pri svakom startu generiše
#    iste naloge/privatne ključeve. Prvi ključ (koji plaća deploy
#    ugovora) pogledaš jednom u logu (`kubectl logs deploy/ganache`)
#    i staviš ga u GANACHE_DEPLOYER_PRIVATE_KEY ispod.
# =====================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config

data:
  DATABASE_URL: postgresql://fonduser:password@postgres-service:5432/investfund_users

  POSTGRES_DB: investfund_users
  POSTGRES_USER: fonduser

  MONGO_HOST: mongo-service
  MONGO_DB: investfund

  REDIS_HOST: redis-service

  GANACHE_RPC_URL: http://ganache-service:8545

  MONGO_PORT: "27017"

  REDIS_PORT: "6379"

---
apiVersion: v1
kind: Secret

metadata:
  name: app-secrets

type: Opaque

stringData:

  POSTGRES_PASSWORD: password

  JWT_KEY: nekojakojwt123

  MONGO_USER: root

  MONGO_PASS: rootpassword

  GANACHE_DEPLOYER_PRIVATE_KEY: 0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi

# ---------------------------------------------------------------------
# Baze podataka i blockchain simulator
# ---------------------------------------------------------------------

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

      - name: postgres

        image: postgres:16

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432

        env:

        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD

        volumeMounts:

        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:

      - name: postgres-storage

        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service

metadata:
  name: postgres-service

spec:

  selector:
    app: postgres

  ports:

  - port: 5432
    targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongo

spec:

  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:

    metadata:
      labels:
        app: mongo

    spec:

      containers:

      - name: mongo

        image: mongo:8

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 27017

        env:

        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MONGO_USER

        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MONGO_PASS

        volumeMounts:

        - name: mongo-storage
          mountPath: /data/db

      volumes:

      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc

---
apiVersion: v1
kind: Service

metadata:
  name: mongo-service

spec:

  selector:
    app: mongo

  ports:

  - port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis

spec:

  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:

    metadata:
      labels:
        app: redis

    spec:

      containers:

      - name: redis

        image: redis:7-alpine

        ports:

        - containerPort: 6379

---
apiVersion: v1
kind: Service

metadata:
  name: redis-service

spec:

  selector:
    app: redis

  ports:

  - port: 6379

    targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: ganache

spec:

  replicas: 1

  selector:
    matchLabels:
      app: ganache

  template:

    metadata:
      labels:
        app: ganache

    spec:

      containers:

      - name: ganache

        image: trufflesuite/ganache:v7.9.2

        ports:
        - containerPort: 8545

        args:
          - --host=0.0.0.0
          - --wallet.totalAccounts=10
          - --wallet.defaultBalance=1000
          - --chain.chainId=1337
          - --deterministic
          - --chain.hardfork=berlin

---
apiVersion: v1
kind: Service

metadata:
  name: ganache-service

spec:

  type: NodePort

  selector:
    app: ganache

  ports:

  - port: 8545
    targetPort: 8545
    nodePort: 30004

# ---------------------------------------------------------------------
# Aplikacioni servisi
# ---------------------------------------------------------------------

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:

      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            until nc -z postgres-service 5432
            do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done

      containers:

      - name: auth-service

        image: registracija:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        envFrom:

        - configMapRef:
            name: app-config

        - secretRef:
            name: app-secrets

---
apiVersion: v1
kind: Service

metadata:
  name: auth-service

spec:

  type: NodePort

  selector:
    app: auth-service

  ports:

  - port: 5000
    targetPort: 5000
    nodePort: 30001


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongo-service 27017 && nc -z redis-service 6379; do echo cekam mongo/redis...; sleep 2; done"]
      containers:
        - name: employee-service
          image: zaposleni:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
        

---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
spec:
  type: NodePort
  selector:
    app: employee-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30002


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: director-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: director-service
  template:
    metadata:
      labels:
        app: director-service
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongo-service 27017 && nc -z redis-service 6379 && nc -z ganache-service 8545; do echo cekam zavisnosti...; sleep 2; done"]
      containers:
        - name: director-service
          image: direktor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: director-service
spec:
  type: NodePort
  selector:
    app: director-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30003

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modifikacija-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modifikacija-service
  template:
    metadata:
      labels:
        app: modifikacija-service
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongo-service 27017
              do
                echo waiting...
                sleep 2
              done

      containers:
        - name: modifikacija-service
          image: modifikacija:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: modifikacija-service
spec:
  type: NodePort
  selector:
    app: modifikacija-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30005